<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSET Academy | Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #E2B13C; /* Luxury Gold */
            --accent-dim: rgba(226, 177, 60, 0.1);
            --bg: #000000;
            --surface: #0C0C0C;
            --text-main: #FFFFFF;
            --text-dim: #888888;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: flex-end;
            overflow: hidden;
        }

        /* Side Panel */
        .side-panel {
            width: 100%;
            max-width: 420px;
            height: 100%;
            background: var(--surface);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scrollbar-width: none;
            box-shadow: -10px 0 50px rgba(0,0,0,0.8);
        }

        .side-panel::-webkit-scrollbar { display: none; }

        .hero-img {
            width: 100%;
            height: auto;
            border-bottom: 2px solid var(--accent);
            display: block;
        }

        .container {
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        /* Countdown */
        .timer-section { text-align: center; margin-bottom: 35px; }

        .section-label {
            font-family: 'Syncopate', sans-serif;
            font-size: 10px;
            letter-spacing: 4px;
            color: var(--accent);
            margin-bottom: 20px;
            display: block;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .timer-unit {
            background: var(--glass);
            padding: 15px 5px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .timer-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            display: block;
        }

        .timer-lbl {
            font-size: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Info Card */
        .info-card {
            background: linear-gradient(145deg, #161616, #0f0f0f);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 35px;
            border: 1px solid var(--accent-dim);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .info-row:last-child { border: none; }

        .info-row span {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .info-row p { font-size: 14px; font-weight: 600; color: #fff; }

        /* QR Section */
        .qr-section { text-align: center; margin-bottom: 35px; }

        .qr-wrapper {
            width: 150px;
            height: 150px;
            background: #fff;
            margin: 0 auto;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(226, 177, 60, 0.1);
        }

        .qr-wrapper img { width: 100%; height: 100%; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            padding: 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            transition: 0.3s all ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: var(--text-main); color: #000; }
        .btn-secondary { 
            background: transparent; 
            color: #25d366; 
            border: 1px solid rgba(37, 211, 102, 0.2); 
        }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .footer-text {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .footer-wa-icon {
            display: inline-block;
            transition: 0.3s ease;
            opacity: 0.6;
        }

        .footer-wa-icon:hover { opacity: 1; transform: scale(1.1); }

        @media (max-width: 500px) {
            .side-panel { width: 100%; max-width: none; border-left: none; }
        }
    </style>
</head>
<body>

    <div class="side-panel">
        <img src="image0.png" alt="camp" class="hero-img">

        <div class="container">
            <div class="timer-section">
                <span class="section-label">EVENT STARTING AT</span>
                <div class="timer-grid" id="timer">
                    <div class="timer-unit"><span class="timer-val" id="days">00</span><span class="timer-lbl">Days</span></div>
                    <div class="timer-unit"><span class="timer-val" id="hours">00</span><span class="timer-lbl">Hours</span></div>
                    <div class="timer-unit"><span class="timer-val" id="mins">00</span><span class="timer-lbl">Mins</span></div>
                    <div class="timer-unit"><span class="timer-val" id="secs">00</span><span class="timer-lbl">Secs</span></div>
                </div>
            </div>

            <div class="info-card">
                <div class="info-row"><span>Timeline</span><p>20 - 26 April, 2026</p></div>
                <div class="info-row"><span>Schedule</span><p>02:15 PM IST</p></div>
                <div class="info-row"><span>Location</span><p>ASSET Academy, Othayi</p></div>
            </div>

            <div class="qr-section">
                <span class="section-label">Scan to Join</span>
                <div class="qr-wrapper">
                    <img src="image100.png" alt="Registration QR">
                </div>
            </div>

            <div class="btn-group">
                <a href="https://forms.gle/JfN3gaQTWxSCSd9CA" class="btn btn-primary" target="_blank">REGISTER NOW</a>
                <a href="https://wa.me/917907826147?text=Hi, I would like to register for ASSET Elite" class="btn btn-secondary" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="18">
                    CHAT ON WHATSAPP
                </a>
            </div>

            <footer>
                <p class="footer-text">© 2026 BY SUMMERISE MORAL SCHOOL</p>
                <a href="https://wa.me/917907826147" class="footer-wa-icon" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="22" alt="Contact">
                </a>
            </footer>
        </div>
    </div>

    <script>
        const targetDate = new Date("April 20, 2026 14:15:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById('timer').innerHTML = 
                    "<p style='color:var(--accent); font-weight:700; grid-column: span 4; letter-spacing:2px;'>EVENT IN PROGRESS</p>";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = String(d).padStart(2, '0');
            document.getElementById('hours').innerText = String(h).padStart(2, '0');
            document.getElementById('mins').innerText = String(m).padStart(2, '0');
            document.getElementById('secs').innerText = String(s).padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>

</body>
</html>
