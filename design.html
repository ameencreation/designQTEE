<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DesignQTEE | Elite Visual Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000; 
            --gold: #e6be8a; 
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.15); /* 15% Transparency */
            --border: rgba(230, 190, 138, 0.2);
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body.light-mode {
            --bg: #ffffff; 
            --text: #1a1a1a; 
            --glass: rgba(0, 0, 0, 0.08); 
            --border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            transition: background 0.6s ease, color 0.6s ease;
        }

        /* --- LIVE GRADIENT & 45° LINE BACKGROUND --- */
        .bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(-45deg, #000000, #2b004d, #ffffff, #1a0033);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .bg-lines {
            position: absolute;
            inset: -100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(125, 125, 125, 0.1) 0px,
                rgba(125, 125, 125, 0.1) 1px,
                transparent 1px,
                transparent 40px
            );
            animation: linesMove 20s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes linesMove {
            from { transform: translateY(0); }
            to { transform: translateY(40px); }
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s var(--transition);
        }

        .loader-container {
            position: relative;
            width: 240px; height: 240px;
            display: flex; justify-content: center; align-items: center;
        }

        .gold-ring {
            width: 180px; height: 180px;
            border: 12px solid var(--gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        .loader-brand { color: #fff; font-weight: 700; font-size: 16px; letter-spacing: 1px; }

        .dot-orbit {
            position: absolute; width: 100%; height: 100%;
            animation: orbit 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }

        .orbit-dot {
            position: absolute; top: 15px; left: 50%;
            transform: translateX(-50%);
            width: 26px; height: 26px;
            background-color: #fff; border-radius: 50%;
            box-shadow: 0 0 20px var(--gold);
        }

        @keyframes orbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 25px 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }

        .theme-toggle {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            padding: 8px 15px; border: 1px solid var(--border); border-radius: 30px;
        }

        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 6px; z-index: 1101; }
        .menu-btn span { width: 25px; height: 1px; background: var(--gold); transition: 0.3s; }

        /* --- GLASSY NAV OVERLAY --- */
        .nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.15); /* 15% Transparency */
            backdrop-filter: blur(25px); /* Strong glassy blur */
            -webkit-backdrop-filter: blur(25px);
            z-index: 1050;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            clip-path: circle(0% at 90% 5%);
            transition: 0.8s var(--transition);
        }
        
        .nav-overlay.open { clip-path: circle(150% at 90% 5%); }

        .nav-overlay a { 
            text-decoration: none; 
            color: var(--text); 
            font-size: clamp(30px, 8vw, 50px); 
            margin: 15px 0; 
            font-family: 'Cormorant Garamond';
            transition: 0.3s;
            letter-spacing: 2px;
        }

        .nav-overlay a:hover { color: var(--gold); letter-spacing: 6px; }

        /* --- MAIN CONTENT --- */
        .container { max-width: 600px; margin: 0 auto; padding: 150px 25px 50px; text-align: center; }

        .hero-title { 
            font-family: 'Cormorant Garamond', serif; font-size: clamp(50px, 10vw, 80px);
            background: linear-gradient(90deg, var(--text), var(--gold), var(--text));
            background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        .work-grid { margin: 60px 0; display: flex; flex-direction: column; gap: 40px; }
        .work-item { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); background: var(--glass); }
        .work-item img { width: 100%; height: 450px; object-fit: cover; }
        .inquiry-btn { display: block; padding: 20px; text-decoration: none; background: var(--gold); color: #000; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }

        /* --- GLASSY COMMENT BOX --- */
        .comment-box { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: left;
            margin-top: 40px;
        }

        textarea {
            width: 100%; height: 120px; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid var(--border); 
            color: var(--text); padding: 15px;
            margin: 20px 0; outline: none; border-radius: 8px;
        }

        .submit-btn {
            width: 100%; padding: 18px; 
            background: rgba(230, 190, 138, 0.1); 
            backdrop-filter: blur(5px);
            border: 1px solid var(--gold); color: var(--gold); 
            font-weight: 700; cursor: pointer; transition: 0.4s; border-radius: 8px;
        }
        .submit-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(230, 190, 138, 0.4); }

        .reveal { opacity: 0; transform: translateY(40px); transition: 1s var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        footer { margin-top: 80px; font-size: 10px; letter-spacing: 3px; opacity: 0.4; }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="bg-lines"></div>
    </div>

    <div id="preloader">
        <div class="loader-container">
            <div class="gold-ring">
                <div class="loader-brand">DesignQTEE<span>.in</span></div>
            </div>
            <div class="dot-orbit">
                <div class="orbit-dot"></div>
            </div>
        </div>
    </div>

    <header>
        <div class="theme-toggle" onclick="toggleTheme()">
            <i id="themeIcon" class="fas fa-moon"></i>
            <span id="modeText" style="color:var(--gold); font-size: 10px; font-weight:700;">DARK</span>
        </div>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span style="margin: 6px 0;"></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <a href="#designs" onclick="toggleMenu()">PORTFOLIO</a>
        <a href="https://wa.me/917907826147" target="_blank">CONTACT</a>
        <a href="#more-info" onclick="toggleMenu()">LEAVE MESSAGE</a>
        <div style="margin-top: 40px; color: var(--gold); cursor: pointer; font-weight: 700; letter-spacing: 2px;" onclick="toggleMenu()">CLOSE</div>
    </nav>

    <div class="container">
        <div class="reveal">
            <h1 class="hero-title">DesignQTEE</h1>
            <p style="font-family:'Cormorant Garamond'; font-style:italic; color:var(--gold); margin-top:10px;">Premium Visual Craftsmanship</p>
        </div>

        <div id="designs" class="work-grid">
            <div class="work-item reveal">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800" alt="Design 1">
                <a href="https://wa.me/917907826147" class="inquiry-btn">Enquire Now</a>
            </div>
            <div class="work-item reveal">
                <img src="https://images.unsplash.com/photo-1634157703702-3c124b455499?w=800" alt="Design 2">
                <a href="https://wa.me/917907826147" class="inquiry-btn">Enquire Now</a>
            </div>
        </div>

        <div id="more-info" class="comment-box reveal">
            <h3 style="font-family: 'Cormorant Garamond'; font-size: 28px;">Start a Project</h3>
            <textarea id="userComment" placeholder="Describe your vision..."></textarea>
            <button class="submit-btn" onclick="sendToWhatsApp()">SEND VIA WHATSAPP</button>
        </div>

        <footer class="reveal">&copy; 2026 DESIGNQTEE STUDIO | CREATED BY AMEEN</footer>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 800);
            }, 3000); 
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('themeIcon').className = isLight ? 'fas fa-sun' : 'fas fa-moon';
            document.getElementById('modeText').innerText = isLight ? 'LIGHT' : 'DARK';
        }

        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            nav.classList.toggle('open');
            document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : 'auto';
        }

        function sendToWhatsApp() {
            const comment = document.getElementById('userComment').value;
            if(!comment.trim()) return alert("Please type something.");
            window.open(`https://wa.me/917907826147?text=${encodeURIComponent("Inquiry: " + comment)}`, '_blank');
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
