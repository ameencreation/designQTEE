<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DesignQTEE | Elite Visual Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #050505;
            --bg-purple: #120026; 
            --gold: #e6be8a; 
            --text: #ffffff;
            --border: rgba(230, 190, 138, 0.15);
            --transition: cubic-bezier(0.77, 0, 0.175, 1);
            --insta-neon: #ff007f;
            --wa-neon: #00ff41;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: var(--bg-black); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- PRELOADER --- */
        #loader-wrapper {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .spinner {
            width: 3em; height: 3em; border-radius: 50%; border: 2px solid #444;
            box-shadow: -10px -10px 10px #6359f8, 0px -10px 10px 0px #9c32e2, 10px -10px 10px #f36896, 10px 0 10px #ff0b0b, 10px 10px 10px 0px#ff5500, 0 10px 10px 0px #ff9500, -10px 10px 10px 0px #ffb700;
            animation: rot55 0.7s linear infinite; position: relative;
        }
        @keyframes rot55 { to { transform: rotate(360deg); } }
        .loader-hidden { opacity: 0; visibility: hidden; }

        /* --- BACKGROUND DYNAMICS --- */
        .bg-wrapper { 
            position: fixed; inset: 0; z-index: -1; 
            background: radial-gradient(circle at center, var(--bg-purple) 0%, var(--bg-black) 100%);
            overflow: hidden; 
        }
        .bg-lines {
            position: absolute; width: 300%; height: 300%; top: -100%; left: -150%;
            background-image: linear-gradient(rgba(230, 190, 138, 0.05) 1px, transparent 1px);
            background-size: 100% 50px; transform: rotate(45deg); animation: moveLines 8s linear infinite; 
        }
        @keyframes moveLines { from { transform: rotate(45deg) translateY(0); } to { transform: rotate(45deg) translateY(50px); } }

        /* --- NAVIGATION --- */
        header { position: fixed; top: 0; width: 100%; padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .brand-name { font-family: 'Playfair Display'; font-size: 26px; font-weight: 900; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
        
        .menu-btn { cursor: pointer; z-index: 3100; width: 30px; height: 20px; position: relative; }
        .menu-btn span { display: block; position: absolute; height: 2px; width: 100%; background: var(--gold); transition: .4s var(--transition); }
        .menu-btn span:nth-child(1) { top: 0; }
        .menu-btn span:nth-child(2) { top: 9px; }
        .menu-btn span:nth-child(3) { top: 18px; }
        .menu-btn.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-btn.open span:nth-child(2) { opacity: 0; }
        .menu-btn.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        .nav-overlay { 
            position: fixed; inset: 0; z-index: 2500; background: rgba(0,0,0,0.98); 
            clip-path: circle(0% at 95% 5%); transition: clip-path 0.8s var(--transition);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .nav-overlay.open { clip-path: circle(150% at 95% 5%); }
        .nav-links { list-style: none; text-align: center; }
        .nav-links a { 
            display: inline-block; text-decoration: none; color: #fff; font-size: clamp(30px, 8vw, 60px); 
            font-family: 'Cormorant Garamond'; letter-spacing: 2px; transition: 0.5s; margin: 10px 0;
        }
        .nav-links a:hover { color: var(--gold); letter-spacing: 8px; font-style: italic; }

        /* --- HERO SECTION --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 180px 20px 80px; text-align: center; }
        .hero-title { 
            font-family: 'Playfair Display'; font-size: clamp(50px, 15vw, 130px); font-weight: 900; 
            background: linear-gradient(to right, #fff, var(--gold), #fff);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        .slogan { 
            color: var(--gold); font-family: 'Cormorant Garamond'; font-style: italic; font-size: clamp(18px, 4vw, 26px); 
            margin-top: 15px; letter-spacing: 3px; animation: premiumBlurClear 3s var(--transition) forwards; 
        }
        @keyframes premiumBlurClear {
            0% { filter: blur(20px); opacity: 0; transform: translateY(20px); }
            100% { filter: blur(0); opacity: 1; transform: translateY(0); }
        }

        /* --- SECTION HEADING (DEMO DESIGNS) --- */
        .section-header { margin: 120px 0 50px; text-align: center; }
        .subtitle { display: block; font-size: 11px; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; opacity: 0.7; }
        .demo-heading { 
            font-family: 'Playfair Display', serif; font-size: clamp(35px, 7vw, 65px); font-weight: 900; 
            letter-spacing: 20px; color: #fff; text-transform: uppercase; transition: 1.5s var(--transition); 
        }
        .reveal.active .demo-heading { letter-spacing: 5px; }
        .gold-line { width: 0; height: 1px; background: var(--gold); margin: 20px auto; transition: 1.2s ease 0.4s; }
        .reveal.active .gold-line { width: 100px; }

        /* --- WORK GRID --- */
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-bottom: 100px; }
        .work-item { position: relative; background: #0a0a0a; border: 1px solid var(--border); overflow: hidden; }
        .work-item img { width: 100%; height: 450px; object-fit: cover; opacity: 0.6; transition: 1s var(--transition); cursor: pointer; }
        .work-item:hover img { opacity: 1; transform: scale(1.08); }
        .enquire-bar { 
            display: block; width: 100%; padding: 20px; text-align: center; background: var(--gold); 
            color: #000; text-decoration: none; font-weight: 900; font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
            transition: 0.3s;
        }
        .enquire-bar:hover { background: #fff; letter-spacing: 5px; }

        /* --- SOCIALS --- */
        .social-icons-wrap { display: flex; justify-content: center; gap: 60px; margin: 80px 0; }
        .social-icons-wrap a { font-size: 65px; transition: 0.5s var(--transition); }
        .icon-insta { color: var(--insta-neon); filter: drop-shadow(0 0 10px var(--insta-neon)); }
        .icon-wa { color: var(--wa-neon); filter: drop-shadow(0 0 10px var(--wa-neon)); }
        .social-icons-wrap a:hover { transform: scale(1.2) translateY(-15px); filter: drop-shadow(0 0 30px currentColor); }

        /* --- MODALS & VIEWERS --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 4000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(20px); }
        .modal-box { background: #000; border: 1px solid var(--gold); padding: 50px; text-align: center; width: 90%; max-width: 400px; opacity: 0; transform: scale(0.9); transition: 0.5s; }
        .modal-box.active { opacity: 1; transform: scale(1); }
        .btn { width: 100%; padding: 18px; margin: 10px 0; cursor: pointer; font-weight: 900; border: none; letter-spacing: 2px; text-transform: uppercase; }

        .fs-view { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; justify-content: center; align-items: center; }
        .fs-view img { max-width: 90%; max-height: 85vh; border: 1px solid var(--border); }
        .fs-x { position: absolute; top: 40px; right: 40px; color: var(--gold); font-size: 40px; cursor: pointer; }

        /* --- UTILS --- */
        .reveal { opacity: 0; transform: translateY(50px); transition: 1.5s var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        footer { padding: 80px 20px; text-align: center; opacity: 0.4; font-size: 10px; letter-spacing: 8px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="spinner"></div>
    </div>

    <div class="bg-wrapper"><div class="bg-lines"></div></div>

    <header>
        <a href="#" class="brand-name">DesignQTEE</a>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-links">
            <li><a href="#portfolio" onclick="toggleMenu()">PORTFOLIO</a></li>
            <li><a href="https://wa.me/917907826147" target="_blank">ENQUIRE</a></li>
            <li><a href="https://www.instagram.com/DesignQTEE" target="_blank">INSTAGRAM</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="reveal">
            <h1 class="hero-title">DesignQTEE</h1>
            <p class="slogan">" You Arrived at the Right Place "</p>
        </section>

        <div class="section-header reveal">
            <span class="subtitle">Exclusive Gallery</span>
            <h2 class="demo-heading">DEMO DESIGNS</h2>
            <div class="gold-line"></div>
        </div>

        <div id="portfolio" class="work-grid">
            <div class="work-item reveal"><img src="image1.png" onclick="askView('image1.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
            <div class="work-item reveal"><img src="image2.png" onclick="askView('image2.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
            <div class="work-item reveal"><img src="image3.png" onclick="askView('image3.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
            <div class="work-item reveal"><img src="image4.png" onclick="askView('image4.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
        </div>

        <section class="social-connect reveal">
            <div class="social-icons-wrap">
                <a href="https://www.instagram.com/DesignQTEE" target="_blank" class="icon-insta"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/917907826147" target="_blank" class="icon-wa"><i class="fab fa-whatsapp"></i></a>
            </div>
        </section>

        <footer>&copy; 2026 DESIGNQTEE STUDIO | CREATED BY AMEEN</footer>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <h2 style="color:var(--gold); margin-bottom:25px; font-family:'Playfair Display'; font-size: 24px;">PREVIEW DESIGN</h2>
            <button class="btn" style="background:var(--gold); color:#000;" id="goFull">FULL SCREEN</button>
            <button class="btn" style="background:transparent; color:#fff; border:1px solid var(--border);" onclick="closeModal()">DISMISS</button>
        </div>
    </div>

    <div class="fs-view" id="fsView">
        <span class="fs-x" onclick="closeFS()">&times;</span>
        <img src="" id="fsImg">
    </div>

    <script>
        // Loader
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader-wrapper");
            setTimeout(() => { loader.classList.add("loader-hidden"); }, 1000);
        });

        // Menu
        const menuBtn = document.getElementById('menuToggle');
        const navOverlay = document.getElementById('navOverlay');
        
        function toggleMenu() {
            menuBtn.classList.toggle('open');
            navOverlay.classList.toggle('open');
            document.body.style.overflow = navOverlay.classList.contains('open') ? 'hidden' : 'auto';
        }
        menuBtn.addEventListener('click', toggleMenu);

        // Preview Logic
        let currentImg = "";
        function askView(src) {
            currentImg = src;
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modalBox').classList.add('active'), 10);
        }
        function closeModal() {
            document.getElementById('modalBox').classList.remove('active');
            setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 400);
        }
        document.getElementById('goFull').onclick = () => {
            closeModal();
            document.getElementById('fsImg').src = currentImg;
            document.getElementById('fsView').style.display = 'flex';
        }
        function closeFS() { document.getElementById('fsView').style.display = 'none'; }

        // Reveal Animation Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.15 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
