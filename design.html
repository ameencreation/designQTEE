<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DesignQTEE | Elite Visual Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Playfair+Display:wght@700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #000000; 
            --gold: #e6be8a; 
            --purple: #1a0033; 
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(230, 190, 138, 0.2);
            --transition: cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body { 
            background: #000; 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- BACKGROUND WITH HIGH VISIBILITY LINES --- */
        .bg-wrapper {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(-45deg, #000000, #1a0033, #330066, #000000);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        .bg-lines {
            position: absolute; inset: -100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.12) 0px, 
                rgba(255, 255, 255, 0.12) 1px,
                transparent 1px,
                transparent 40px
            );
            animation: linesMove 20s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes linesMove { from { transform: translateY(0); } to { transform: translateY(40px); } }

        /* --- ULTRA LUXURY PRELOADER --- */
        #preloader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column;
            transition: opacity 1s var(--transition);
        }

        .loader-wrap {
            position: relative;
            width: 80px; height: 80px;
            display: flex; justify-content: center; align-items: center;
        }

        .pulse-ring {
            position: absolute;
            width: 100%; height: 100%;
            border: 1px solid var(--gold);
            border-radius: 50%;
            animation: pulseExpand 2s infinite;
            opacity: 0;
        }

        .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
        .pulse-ring:nth-child(3) { animation-delay: 1s; }

        .loader-logo {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 4px;
            font-weight: 700;
            z-index: 2;
            text-shadow: 0 0 10px rgba(230, 190, 138, 0.5);
        }

        @keyframes pulseExpand {
            0% { transform: scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 25px 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1100; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
        }
        .brand-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: var(--gold); text-decoration: none; letter-spacing: 1px; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 7px; }
        .menu-btn span { width: 28px; height: 2px; background: var(--gold); transition: 0.3s; }

        /* --- NAV OVERLAY --- */
        .nav-overlay {
            position: fixed; inset: 0; z-index: 1050;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            clip-path: circle(0% at 90% 5%); transition: 0.8s var(--transition);
            background: rgba(0, 0, 0, 0.98); backdrop-filter: blur(25px);
        }
        .nav-overlay.open { clip-path: circle(150% at 90% 5%); }
        .nav-overlay a { text-decoration: none; color: #fff; font-size: 38px; margin: 15px 0; font-family: 'Cormorant Garamond'; letter-spacing: 2px; transition: 0.3s; }
        .nav-overlay a:hover { color: var(--gold); letter-spacing: 5px; }

        /* --- MAIN CONTENT --- */
        .container { max-width: 900px; margin: 0 auto; padding: 180px 20px 50px; text-align: center; }

        .hero-title { 
            font-family: 'Playfair Display', serif; font-size: clamp(55px, 12vw, 90px);
            background: linear-gradient(90deg, #b8860b, #fff, #b8860b);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite; margin-bottom: 10px;
            font-weight: 900;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* --- WORK GRID - UPDATED FOR 4 IMAGES --- */
        .work-grid { margin: 80px 0; display: grid; grid-template-columns: 1fr; gap: 60px; }
        
        /* Tablet/Desktop-ൽ രണ്ട് ഫോട്ടോകൾ വശങ്ങളിൽ വരാൻ */
        @media (min-width: 768px) {
            .work-grid { grid-template-columns: 1fr 1fr; gap: 30px; }
        }

        .work-item { 
            position: relative; border-radius: 12px; overflow: hidden; 
            background: var(--glass); border: 2px solid var(--gold);
            animation: liveBorder 4s infinite ease-in-out;
            transition: 0.6s var(--transition);
            display: flex; flex-direction: column;
        }
        .work-item img { width: 100%; height: 400px; object-fit: cover; transition: 0.8s; }
        .work-item:hover { transform: translateY(-10px); }
        
        .inquiry-btn { 
            display: block; padding: 20px; text-decoration: none; 
            color: #000; font-weight: 900; font-size: 13px; letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #e6be8a, #ffffff, #e6be8a);
            background-size: 200% auto;
            animation: liveButton 3s infinite linear;
        }

        @keyframes liveBorder {
            0%, 100% { border-color: #e6be8a; box-shadow: 0 0 15px rgba(230,190,138,0.3); }
            50% { border-color: #ffffff; box-shadow: 0 0 30px rgba(255,255,255,0.4); }
        }
        @keyframes liveButton { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        /* --- COMMENT BOX --- */
        .comment-box { 
            background: rgba(255, 255, 255, 0.03); padding: 50px 30px; border-radius: 20px; 
            border: 1px solid var(--border); margin-top: 80px; text-align: left;
            backdrop-filter: blur(15px); max-width: 800px; margin-left: auto; margin-right: auto;
        }
        textarea { width: 100%; height: 120px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: #fff; padding: 20px; border-radius: 12px; margin-bottom: 25px; outline: none; font-size: 16px; }
        .submit-btn { width: 100%; padding: 20px; background: var(--gold); border: none; font-weight: 800; cursor: pointer; border-radius: 12px; color: #000; font-size: 15px; letter-spacing: 1px; transition: 0.3s; }
        .submit-btn:hover { background: #fff; transform: scale(1.02); }

        /* --- FOOTER --- */
        footer { margin-top: 100px; padding-bottom: 50px; text-align: center; }
        .social-icons { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .social-icons a { color: var(--gold); font-size: 35px; text-decoration: none; transition: 0.4s; }
        .social-icons a:hover { transform: scale(1.3) translateY(-5px); color: #fff; text-shadow: 0 0 20px var(--gold); }
        .copyright { opacity: 0.5; font-size: 11px; letter-spacing: 3px; font-weight: 300; }

        .reveal { opacity: 0; transform: translateY(40px); transition: 1.2s var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="bg-lines"></div>
    </div>

    <div id="preloader">
        <div class="loader-wrap">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="loader-logo">QTEE</div>
        </div>
    </div>

    <header>
        <a href="#" class="brand-name">DesignQTEE</a>
        <div class="menu-btn" onclick="toggleMenu()">
            <span></span><span style="margin: 7px 0;"></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <a href="#designs" onclick="toggleMenu()">PORTFOLIO</a>
        <a href="https://wa.me/917907826147" target="_blank">CONTACT</a>
        <a href="#more-info" onclick="toggleMenu()">LEAVE MESSAGE</a>
        <p style="color:var(--gold); margin-top:50px; cursor:pointer; letter-spacing: 2px;" onclick="toggleMenu()">[ CLOSE ]</p>
    </nav>

    <div class="container">
        <div class="reveal">
            <h1 class="hero-title">DesignQTEE</h1>
            <p style="font-family:'Cormorant Garamond'; font-style:italic; color:var(--gold); font-size: 22px; letter-spacing: 2px;">Elite Visual Craftsmanship</p>
        </div>

        <div id="designs" class="work-grid">
            <div class="work-item reveal">
                <img src="image1.png" alt="Design 1">
                <a href="https://wa.me/917907826147" class="inquiry-btn">Enquire Now</a>
            </div>
            <div class="work-item reveal">
                <img src="image2.png" alt="Design 2">
                <a href="https://wa.me/917907826147" class="inquiry-btn">Enquire Now</a>
            </div>
            <div class="work-item reveal">
                <img src="image3.png" alt="Design 3">
                <a href="https://wa.me/917907826147" class="inquiry-btn">Enquire Now</a>
            </div>
            <div class="work-item reveal">
                <img src="image4.png" alt="Design 4">
                <a href="https://wa.me/917907826147" class="inquiry-btn">Enquire Now</a>
            </div>
        </div>

        <div id="more-info" class="comment-box reveal">
            <h3 style="color:var(--gold); margin-bottom:20px; font-family:'Playfair Display'; font-size: 32px;">Start Your Vision</h3>
            <textarea id="userComment" placeholder="Tell us about your project..."></textarea>
            <button class="submit-btn" onclick="sendToWhatsApp()">SEND VIA WHATSAPP</button>
        </div>

        <footer>
            <div class="social-icons reveal">
                <a href="https://www.instagram.com/DesignQTEE" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/917907826147" target="_blank"><i class="fab fa-whatsapp"></i></a>
            </div>
            <div class="copyright">&copy; 2026 DESIGNQTEE STUDIO | CREATED BY AMEEN</div>
        </footer>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('preloader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 1000);
            }, 2500); 
        });

        function toggleMenu() {
            const nav = document.getElementById('navOverlay');
            nav.classList.toggle('open');
            document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : 'auto';
        }

        function sendToWhatsApp() {
            const comment = document.getElementById('userComment').value;
            if(!comment.trim()) return alert("Please enter your message.");
            window.open(`https://wa.me/917907826147?text=${encodeURIComponent("Project Inquiry: " + comment)}`, '_blank');
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
