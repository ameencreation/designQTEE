<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DesignQTEE | Elite Visual Studio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-black: #000000;
            --bg-purple: #1a0033; 
            --gold: #e6be8a; 
            --text: #ffffff;
            --border: rgba(230, 190, 138, 0.15);
            --transition: cubic-bezier(0.77, 0, 0.175, 1);
            --insta-neon: #ff007f;
            --wa-neon: #00ff41;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background: var(--bg-black); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- PRELOADER --- */
        #loader-wrapper {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.8s ease;
        }
        .spinner {
            width: 3em; height: 3em; border-radius: 50%; border: 2px solid #444;
            box-shadow: -10px -10px 10px #6359f8, 0px -10px 10px 0px #9c32e2, 10px -10px 10px #f36896, 10px 0 10px #ff0b0b, 10px 10px 10px 0px#ff5500, 0 10px 10px 0px #ff9500, -10px 10px 10px 0px #ffb700;
            animation: rot55 0.7s linear infinite; position: relative;
        }
        .spinnerin { border: 2px solid #444; width: 1.5em; height: 1.5em; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        @keyframes rot55 { to { transform: rotate(360deg); } }
        .loader-hidden { opacity: 0; visibility: hidden; }

        /* --- BACKGROUND 45° LINES --- */
        .bg-wrapper { 
            position: fixed; inset: 0; z-index: -1; 
            background: linear-gradient(135deg, var(--bg-black), var(--bg-purple), var(--bg-black));
            background-size: 400% 400%; animation: gradientShift 15s ease infinite; overflow: hidden; 
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .bg-lines {
            position: absolute; width: 300%; height: 300%; top: -100%; left: -150%;
            background-image: linear-gradient(rgba(230, 190, 138, 0.08) 1.5px, transparent 1.5px);
            background-size: 100% 60px; transform: rotate(45deg); animation: moveLines 5s linear infinite; 
        }
        @keyframes moveLines { from { transform: rotate(45deg) translateY(0); } to { transform: rotate(45deg) translateY(60px); } }

        /* --- HEADER & HAMBURGER TO CLOSE --- */
        header { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); }
        .brand-name { font-family: 'Playfair Display'; font-size: 24px; font-weight: 900; color: var(--gold); text-decoration: none; letter-spacing: 2px; }
        
        .menu-btn { cursor: pointer; z-index: 3100; width: 35px; height: 25px; position: relative; }
        .menu-btn span { display: block; position: absolute; height: 2px; width: 100%; background: var(--gold); transition: .3s ease-in-out; }
        .menu-btn span:nth-child(1) { top: 0px; }
        .menu-btn span:nth-child(2) { top: 10px; }
        .menu-btn span:nth-child(3) { top: 20px; }

        /* Transform to 'X' Close */
        .menu-btn.open span:nth-child(1) { top: 10px; transform: rotate(135deg); }
        .menu-btn.open span:nth-child(2) { opacity: 0; left: -60px; }
        .menu-btn.open span:nth-child(3) { top: 10px; transform: rotate(-135deg); }

        /* --- CIRCULAR NAV OVERLAY --- */
        .nav-overlay { 
            position: fixed; inset: 0; z-index: 2500; 
            background: rgba(0,0,0,0.98); 
            clip-path: circle(0% at 95% 5%);
            transition: clip-path 0.8s var(--transition);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .nav-overlay.open { clip-path: circle(150% at 95% 5%); }
        .nav-links { list-style: none; text-align: center; }
        .nav-links li { overflow: hidden; margin: 15px 0; }
        .nav-overlay a { 
            display: inline-block; text-decoration: none; color: #fff; 
            font-size: clamp(28px, 7vw, 50px); font-family: 'Cormorant Garamond'; 
            letter-spacing: 2px; transform: translateY(100%); transition: 0.6s var(--transition);
        }
        .nav-overlay.open a { transform: translateY(0); }
        .nav-links li:nth-child(1) a { transition-delay: 0.1s; }
        .nav-links li:nth-child(2) a { transition-delay: 0.2s; }
        .nav-links li:nth-child(3) a { transition-delay: 0.3s; }
        .nav-links li:nth-child(4) a { transition-delay: 0.4s; }
        .nav-overlay a:hover { color: var(--gold); letter-spacing: 5px; }

        .mini-icons-menu { display: flex; gap: 30px; margin-top: 40px; opacity: 0; transition: 0.8s ease 0.5s; }
        .nav-overlay.open .mini-icons-menu { opacity: 1; }
        .mini-icons-menu i { font-size: 26px; color: var(--gold); }

        /* --- HERO & BLUR SLOGAN --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 200px 20px 100px; text-align: center; }
        .hero-title { 
            font-family: 'Playfair Display'; font-size: clamp(45px, 12vw, 110px); font-weight: 900; 
            background: linear-gradient(to right, #fff 20%, var(--gold) 40%, var(--gold) 60%, #fff 80%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite, floatTitle 6s ease-in-out infinite;
        }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes shine { to { background-position: 200% center; } }
        
        /* Premium Blur Entry Animation */
        .slogan { 
            color: var(--gold); font-family: 'Cormorant Garamond'; font-style: italic; font-size: clamp(18px, 4vw, 24px); 
            margin-top: 20px; letter-spacing: 2px;
            animation: premiumBlurClear 4s cubic-bezier(0.19, 1, 0.22, 1) forwards; 
        }
        @keyframes premiumBlurClear {
            0% { filter: blur(25px); opacity: 0; transform: scale(1.2) translateY(10px); letter-spacing: 15px; }
            50% { filter: blur(10px); opacity: 0.5; }
            100% { filter: blur(0); opacity: 1; transform: scale(1) translateY(0); letter-spacing: 2px; }
        }

        /* --- GRID --- */
        .work-grid { margin: 80px 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .work-item { position: relative; background: rgba(10,10,10,0.8); border: 1px solid var(--border); overflow: hidden; transition: 0.6s; }
        .work-item img { width: 100%; height: 450px; object-fit: cover; opacity: 0.7; transition: 0.8s; cursor: pointer; }
        .work-item:hover img { opacity: 1; transform: scale(1.05); }
        .enquire-bar { display: block; width: 100%; padding: 18px; text-align: center; background: var(--gold); color: #000; text-decoration: none; font-weight: 900; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- NEON SOCIALS --- */
        .social-icons-wrap { display: flex; justify-content: center; gap: 50px; margin: 60px 0; }
        .social-icons-wrap a { font-size: 70px; transition: 0.4s; }
        .icon-insta { color: var(--insta-neon); filter: drop-shadow(0 0 5px var(--insta-neon)); }
        .icon-wa { color: var(--wa-neon); filter: drop-shadow(0 0 5px var(--wa-neon)); }
        .social-icons-wrap a:hover { transform: scale(1.1) translateY(-10px); filter: drop-shadow(0 0 30px currentColor); color: #fff; }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.94); z-index: 4000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .modal-box { background: #000; border: 1px solid var(--gold); padding: 50px; text-align: center; width: 90%; max-width: 400px; transform: translateY(50px); opacity: 0; transition: 0.5s; }
        .modal-box.active { transform: translateY(0); opacity: 1; }
        .btn { width: 100%; padding: 16px; margin: 10px 0; cursor: pointer; font-weight: 800; border: none; letter-spacing: 1px; text-transform: uppercase; font-family: 'Inter'; }

        .fs-view { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; justify-content: center; align-items: center; }
        .fs-view img { max-width: 90%; max-height: 85vh; border: 1px solid var(--border); }
        .fs-x { position: absolute; top: 30px; right: 40px; color: var(--gold); font-size: 45px; cursor: pointer; }

        .reveal { opacity: 0; transform: translateY(40px); transition: 1.2s var(--transition); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        footer { padding: 60px 20px; text-align: center; opacity: 0.3; font-size: 9px; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="spinner"><div class="spinnerin"></div></div>
    </div>

    <div class="bg-wrapper"><div class="bg-lines"></div></div>

    <header>
        <a href="#" class="brand-name">DesignQTEE</a>
        <div class="menu-btn" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navOverlay">
        <ul class="nav-links">
            <li><a href="#portfolio" onclick="toggleMenu()">ABOUT</a></li>
            <li><a href="https://wa.me/917907826147" target="_blank">CONTACT</a></li>
            <li><a href="https://wa.me/917907826147" target="_blank">WHATSAPP</a></li>
            <li><a href="https://www.instagram.com/DesignQTEE" target="_blank">INSTAGRAM</a></li>
        </ul>
        <div class="mini-icons-menu">
            <a href="https://www.instagram.com/DesignQTEE" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/917907826147" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
    </nav>

    <main class="container">
        <section class="reveal">
            <h1 class="hero-title">DesignQTEE</h1>
            <p class="slogan">" You Arrived at Right Place "</p>
        </section>

        <div id="portfolio" class="work-grid">
            <div class="work-item reveal"><img src="image1.png" onclick="askView('image1.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
            <div class="work-item reveal"><img src="image2.png" onclick="askView('image2.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
            <div class="work-item reveal"><img src="image3.png" onclick="askView('image3.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
            <div class="work-item reveal"><img src="image4.png" onclick="askView('image4.png')"><a href="https://wa.me/917907826147" class="enquire-bar">Enquire Now</a></div>
        </div>

        <section class="social-connect reveal">
            <div class="social-icons-wrap">
                <a href="https://www.instagram.com/DesignQTEE" target="_blank" class="icon-insta"><i class="fab fa-instagram"></i></a>
                <a href="https://wa.me/917907826147" target="_blank" class="icon-wa"><i class="fab fa-whatsapp"></i></a>
            </div>
        </section>

        <footer>&copy; 2026 DESIGNQTEE STUDIO | CREATED BY AMEEN</footer>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <h2 style="color:var(--gold); margin-bottom:25px; font-family:'Playfair Display';">PREVIEW DESIGN</h2>
            <button class="btn" style="background:var(--gold); color:#000;" id="goFull">FULL SCREEN</button>
            <button class="btn" style="background:transparent; color:#fff; border:1px solid var(--border);" onclick="closeModal()">DISMISS</button>
        </div>
    </div>

    <div class="fs-view" id="fsView">
        <span class="fs-x" onclick="closeFS()">&times;</span>
        <img src="" id="fsImg">
    </div>

    <script>
        // Preloader
        window.addEventListener("load", () => {
            const loader = document.getElementById("loader-wrapper");
            setTimeout(() => { loader.classList.add("loader-hidden"); }, 1200);
        });

        // Menu Toggle (Hamburger to X)
        const menuBtn = document.getElementById('menuToggle');
        const navOverlay = document.getElementById('navOverlay');

        menuBtn.addEventListener('click', toggleMenu);

        function toggleMenu() {
            menuBtn.classList.toggle('open');
            navOverlay.classList.toggle('open');
            document.body.style.overflow = navOverlay.classList.contains('open') ? 'hidden' : 'auto';
        }

        // Image Handling
        let currentImg = "";
        function askView(src) {
            currentImg = src;
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modalBox').classList.add('active'), 10);
        }
        function closeModal() {
            document.getElementById('modalBox').classList.remove('active');
            setTimeout(() => document.getElementById('modalOverlay').style.display = 'none', 400);
        }
        document.getElementById('goFull').onclick = () => {
            closeModal();
            document.getElementById('fsImg').src = currentImg;
            document.getElementById('fsView').style.display = 'flex';
        }
        function closeFS() { document.getElementById('fsView').style.display = 'none'; }

        // Intersection Observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
